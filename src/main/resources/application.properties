# DataSource MySQL
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=user
quarkus.datasource.password=user_password
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/example_db?useSSL=false&serverTimezone=UTC

# Pool de connexions (optionnel, valeurs recommandées)
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10

# JobRunr - Configuration de base
quarkus.jobrunr.background-job-server.enabled=true
quarkus.jobrunr.dashboard.enabled=true
quarkus.jobrunr.dashboard.port=8000

# JobRunr - Base de données
# JobRunr détecte automatiquement le DataSource bean ci-dessus
quarkus.jobrunr.database.skip-create=false
quarkus.jobrunr.database.type=sql

# JobRunr - Jobs
quarkus.jobrunr.jobs.default-number-of-retries=10
quarkus.jobrunr.jobs.retry-back-off-time-seed=3

# JobRunr - Background Job Server
quarkus.jobrunr.background-job-server.worker-count=4
quarkus.jobrunr.background-job-server.poll-interval=15
#quarkus.jobrunr.background-job-server.delete-succeeded-jobs-after=36h
#quarkus.jobrunr.background-job-server.permanently-delete-deleted-jobs-after=72h